# config.yaml — arXiv digest default configuration
# This file provides base defaults. Per-profile overrides go in profiles/<name>/config.yaml.
# Template users: edit profiles/default/config.yaml (or this file directly).

# --- Basic settings ---
language: en                    # Language for recommendations/summaries (ja / en)
scoring_threshold: 85           # Deliver papers scoring this or above (0-100)
scoring_model: claude-sonnet-4-6  # Model for scoring (Mode A only)

# --- arXiv categories ---
# See https://arxiv.org/category_taxonomy for full list
arxiv_categories:
  - hep-ph
  # - hep-th
  # - gr-qc
  # - astro-ph.CO
  # - cond-mat.str-el

# --- Delivery channels ---
channels:
  mastodon:
    enabled: false
    instance: "https://mastodon.social"
    bot_account: "your_bot"
    mention_target: "@you@mastodon.social"
    # access_token: set via env var MASTODON_ACCESS_TOKEN

  bluesky:
    enabled: false
    handle: "researcher.bsky.social"
    # app_password: set via env var BLUESKY_APP_PASSWORD

  discord:
    enabled: false
    # webhook_url: set via env var DISCORD_WEBHOOK_URL
    # username: "arXiv Digest"            # bot display name
    # mention_target: "<@USER_ID>"         # or "<@&ROLE_ID>" for role mention

  slack:
    enabled: false
    # webhook_url: set via env var SLACK_WEBHOOK_URL

  stdout:
    enabled: false              # For testing/debugging

# --- Writing style ---
style:
  tone: neutral                 # casual / formal / neutral
  emoji_level: moderate         # none / light / moderate / heavy
  # emoji_level guide:
  #   none: no emojis at all
  #   light: 1-2 per recommendation
  #   moderate: 3-4 per recommendation
  #   heavy: 5+ per recommendation, 2-3 per summary

# --- Additional scoring instructions (optional, free-form) ---
# scoring_instructions: |
#   - Example: prioritize papers from my collaborators
