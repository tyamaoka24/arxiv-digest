inspire_name: Ogawa, N.
inspire_arxiv_categories:
- astro-ph.HE
- astro-ph.IM
- gr-qc
- hep-ex
- physics.ins-det
language: ja
scoring_threshold: 85
channels:
  mastodon:
    enabled: false
  discord:
    enabled: true
    username: arXiv Digest
    env_var: DISCORD_WEBHOOK_URL_TAKEDA
