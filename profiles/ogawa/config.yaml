# profiles/ogawa/config.yaml — subscriber profile overrides
# Merged on top of root config.yaml when using --profile ogawa
# (subscriber identity is held in research-collab/collaborators.yaml)

# inspire_bai was previously set to a homonym author and has been cleared
# on 2026-04-14. If the actual subscriber has an INSPIRE BAI, re-run
# `tools/setup_inspire.py` to populate inspire_bai / inspire_name /
# inspire_arxiv_categories.

language: ja
scoring_threshold: 85

arxiv_categories:
  - quant-ph
  - hep-th
  - gr-qc

channels:
  mastodon:
    enabled: false
  discord:
    enabled: true
    username: arXiv Digest
    # Discord mention ID is stored out-of-repo (see research-collab/collaborators.yaml);
    # runtime value is supplied via the DISCORD_MENTION_OGAWA env var (e.g. from .env).
    env_var: DISCORD_WEBHOOK_URL_TAKEDA
    mention_target_env: DISCORD_MENTION_OGAWA

style:
  tone: casual
  emoji_level: moderate
