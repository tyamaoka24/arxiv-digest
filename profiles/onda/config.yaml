# profiles/onda/config.yaml — subscriber profile overrides
# Merged on top of root config.yaml when using --profile onda
# (subscriber identity is held in research-collab/collaborators.yaml)

language: ja
scoring_threshold: 85

# No inspire_bai yet: M1 with no publications. Add via tools/setup_inspire.py
# once the first paper or thesis lands.

arxiv_categories:
  - astro-ph.CO
  - astro-ph.IM
  - astro-ph.HE
  - hep-ph
  - gr-qc

channels:
  mastodon:
    enabled: false
  discord:
    enabled: true
    username: "arXiv Digest"
    env_var: DISCORD_WEBHOOK_URL_TAKEDA
    # Discord mention ID is stored out-of-repo (see research-collab/collaborators.yaml);
    # runtime value is supplied via the DISCORD_MENTION_ONDA env var (e.g. from .env).
    mention_target_env: DISCORD_MENTION_ONDA

style:
  tone: casual
  emoji_level: moderate
