# profiles/takeda/config.yaml — subscriber profile overrides
# Merged on top of root config.yaml when using --profile takeda
# (subscriber identity is held in research-collab/collaborators.yaml)

language: ja
scoring_threshold: 85

arxiv_categories:
  - quant-ph
  - physics.optics
  - hep-ph
  - hep-th

channels:
  mastodon:
    enabled: false
  discord:
    enabled: true
    username: "arXiv Digest"
    env_var: DISCORD_WEBHOOK_URL_TAKEDA
    # Discord mention ID is stored out-of-repo (see research-collab/collaborators.yaml);
    # runtime value is supplied via the DISCORD_MENTION_TAKEDA env var (e.g. from .env).
    mention_target_env: DISCORD_MENTION_TAKEDA

style:
  tone: casual
  emoji_level: moderate
